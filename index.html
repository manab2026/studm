<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Master</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 text-gray-800 transition duration-300">

<div class="max-w-7xl mx-auto p-6">

<div class="flex justify-between items-center mb-8">

<h1 class="text-3xl font-bold tracking-wide">
Student Master
</h1>

<button onclick="toggleDarkMode()"
class="w-12 h-12 rounded-full bg-white shadow hover:bg-gray-200">

<i class="fas fa-moon"></i>

</button>

</div>
<!-- DASHBOARD -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-sm text-gray-500 uppercase">Total Students</h2>
<div id="studentCount" class="text-4xl font-bold mt-2">0</div>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-sm text-gray-500 uppercase">Courses</h2>
<div id="courseCount" class="text-4xl font-bold mt-2">0</div>
</div>

</div>


<!-- FORM -->

<div class="bg-white rounded-2xl shadow p-8 mb-8">

<div class="flex justify-between items-center mb-6">

<h2 class="text-xl font-semibold">
Student Form
</h2>

<div id="formMode"
class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded-full">
Add Mode
</div>

</div>

<input type="hidden" id="rowId">

<div class="grid grid-cols-1 md:grid-cols-3 gap-5">

<div>
<label class="text-sm font-medium block mb-2">Student Name *</label>
<input id="studentName" type="text"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="text-sm font-medium block mb-2">Mobile Number</label>
<input id="mobileNo" type="text"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="text-sm font-medium block mb-2">Enrollment No</label>
<input id="enrollmentNo" type="text"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="text-sm font-medium block mb-2">Enrollment Date *</label>
<input id="enrollmentDate" type="date"
class="w-full border rounded-lg p-3">
</div>

<div>
<label class="text-sm font-medium block mb-2">Course *</label>
<select id="courseName"
class="w-full border rounded-lg p-3">

<option value="">Select Course</option>
<option value="Advance Certification in Investment Law and Institutional Finance">ACIIF</option>
<option value="Executive Certification in Corporate Social Responsibility">CSR</option>
<option value="Executive Certification in Sexual Harassment Prevention and Workplace Diversity Laws">SHP</option>
<option value="Certificate Course in Industrial and Labor Laws">CIL</option>
<option value="Certificate Course in Real Estate Laws">CRE</option>
<option value="Certification in Transfer Pricing Laws">CTP</option>
<option value="Certificate Course in Criminal Litigation and Trial Advocacy Laws">CLTA</option>
<option value="Advance Certificate of Companies Act, 2013">ACCA</option>
<option value="Advance Certification in Information Technology and Social Media Laws">ACITSM</option>

</select>
</div>

<div>
<label class="text-sm font-medium block mb-2">Batch Month</label>
<select id="batchMonth"
class="w-full border rounded-lg p-3">
<option value="">Month</option>
<option>Jan</option>
<option>Feb</option>
<option>Mar</option>
<option>Apr</option>
<option>May</option>
<option>Jun</option>
<option>Jul</option>
<option>Aug</option>
<option>Sep</option>
<option>Oct</option>
<option>Nov</option>
<option>Dec</option>
</select>
</div>

<div>
<label class="text-sm font-medium block mb-2">Batch Year</label>
<input id="batchYear" type="number"
class="w-full border rounded-lg p-3">
</div>

</div>

<div class="flex gap-4 mt-8">

<button onclick="saveStudent()"
id="saveBtn"
class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl">
Save Student
</button>

<button onclick="clearForm()"
class="bg-gray-200 hover:bg-gray-300 px-8 py-3 rounded-xl">
Clear
</button>

</div>

</div>
<!-- FILTERS -->

<div class="bg-white rounded-2xl shadow p-6 mb-6">

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<input type="text"
id="search"
placeholder="Search student..."
onkeyup="searchStudent()"
class="border rounded-lg p-3">

<select id="courseFilter"
onchange="filterByCourse()"
class="border rounded-lg p-3">

<option value="">All Courses</option>

</select>

<button onclick="exportExcel()"
class="bg-green-600 hover:bg-green-700 text-white rounded-lg p-3">
Export Excel
</button>

</div>

</div>


<!-- TABLE -->

<div class="bg-white rounded-2xl shadow overflow-auto">

<table id="studentTableExcel"
class="w-full text-sm">

<thead class="bg-gray-100">
<tr>
<th class="p-4 text-left">#</th>
<th class="p-4 text-left">Student</th>
<th class="p-4 text-left">Mobile</th>
<th class="p-4 text-left">Enrollment</th>
<th class="p-4 text-left">Course</th>
<th class="p-4 text-left">Batch</th>
<th class="p-4 text-left">Enrollment Date</th>
<th class="p-4 text-left">Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<!-- PAGINATION -->

<div class="flex justify-center items-center gap-4 mt-6">

<button onclick="prevPage()"
class="bg-gray-200 px-5 py-2 rounded-lg">
Prev
</button>

<div id="pageNumber" class="font-semibold">
1
</div>

<button onclick="nextPage()"
class="bg-gray-200 px-5 py-2 rounded-lg">
Next
</button>

</div>

</div>
<!-- TOAST -->

<div id="toast"
class="fixed top-5 right-5 hidden bg-black text-white px-6 py-4 rounded-xl shadow-lg z-50">
Toast
</div>

<script src="script.js"></script>

</body>
</html>
