<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Excel Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

    <!-- TITLE -->
    <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">
        Student Management System
    </h1>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-xl shadow grid grid-cols-1 md:grid-cols-3 gap-4">

        <input type="text" id="studentName"
            placeholder="Student Name *"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <input type="text" id="mobileNo"
            placeholder="Mobile Number"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <input type="number" id="asnNo"
            placeholder="ASN Number *"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <input type="date" id="enrollmentDate"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <select id="courseName"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

            <option value="">Select Course *</option>
            <option value="CSR">CSR</option>
            <option value="CIIF">CIIF</option>

        </select>

        <input type="month" id="batch"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <button onclick="saveStudent()"
            class="md:col-span-3 bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">
            Save Student
        </button>

    </div>

    <!-- SEARCH + EXPORT -->
    <div class="mt-6 flex flex-col md:flex-row gap-4">

        <input type="text" id="search"
            placeholder="Search Student..."
            onkeyup="searchStudent()"
            class="flex-1 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

        <button onclick="exportExcel()"
            class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            Export Excel
        </button>

    </div>

    <!-- TABLE -->
    <div class="mt-6 bg-white rounded-xl shadow overflow-x-auto">

        <table id="studentTableExcel" class="w-full text-sm text-left">

            <thead class="bg-blue-600 text-white">
                <tr>
                    <th class="p-3">#</th>
                    <th class="p-3">Student Name</th>
                    <th class="p-3">Mobile No</th>
                    <th class="p-3">Course Name</th>
                    <th class="p-3">ASN No</th>
                    <th class="p-3">Batch</th>
                    <th class="p-3">Enrollment Date</th>
                </tr>
            </thead>

            <tbody id="studentTable" class="text-gray-700"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
