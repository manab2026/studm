<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Master</title>

    <!-- Tailwind -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body id="body" class="bg-gray-100 text-gray-800 transition duration-300">

<div class="min-h-screen p-5">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-6">

        <div class="text-sm font-semibold tracking-wide">
            NJUS
        </div>

        <div class="text-lg font-semibold tracking-widest">
            STUDENT MASTER
        </div>

        <!-- SETTINGS -->
        <button onclick="toggleDarkMode()"
            class="w-10 h-10 rounded-full bg-white shadow flex items-center justify-center hover:bg-gray-200">

            <i class="fas fa-cog"></i>

        </button>

    </div>

    <!-- DASHBOARD CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6">

        <div class="bg-white p-6 rounded shadow text-center">
            <div class="text-xs uppercase tracking-wider text-gray-500">
                Courses Updated
            </div>

            <div id="courseCount"
                class="mt-3 text-3xl font-bold">
                0
            </div>
        </div>

        <div class="bg-white p-6 rounded shadow text-center">
            <div class="text-xs uppercase tracking-wider text-gray-500">
                Students Total
            </div>

            <div id="studentCount"
                class="mt-3 text-3xl font-bold">
                0
            </div>
        </div>

    </div>

    <!-- FORM SECTION -->
    <div class="bg-white border-2 border-blue-500 rounded p-8 mb-6">

        <div class="text-sm mb-6 text-gray-600">
            Form Input
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <input id="studentName"
                type="text"
                placeholder="Student Name"
                class="border p-3 rounded">

            <input id="mobileNo"
                type="text"
                placeholder="Mobile Number"
                class="border p-3 rounded">

            <input id="asnNo"
                type="number"
                placeholder="ASN Number"
                class="border p-3 rounded">

            <input id="enrollmentDate"
                type="date"
                class="border p-3 rounded">

            <select id="courseName"
                class="border p-3 rounded">

                <option value="">
                    Select Course
                </option>

                <option value="CSR">
                    CSR
                </option>

                <option value="CIIF">
                    CIIF
                </option>

            </select>

            <input id="batch"
                type="month"
                class="border p-3 rounded">

        </div>

        <div class="mt-6 flex gap-4">

            <button onclick="saveStudent()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded">

                Save Student

            </button>

            <button onclick="clearForm()"
                class="bg-gray-200 hover:bg-gray-300 px-6 py-3 rounded">

                Clear

            </button>

        </div>

    </div>

    <!-- TABLE SECTION -->
    <div class="bg-white rounded shadow p-6">

        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-5 gap-4">

            <div class="text-sm text-gray-600">
                Students Table with Edit/Delete Features
            </div>

            <div class="flex gap-3">

                <input id="search"
                    type="text"
                    placeholder="Search Student..."
                    onkeyup="searchStudent()"
                    class="border px-4 py-2 rounded">

                <button onclick="exportExcel()"
                    class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">

                    Export

                </button>

            </div>

        </div>

        <div class="overflow-auto">

            <table id="studentTableExcel"
                class="w-full text-sm">

                <thead>

                    <tr class="bg-gray-100">

                        <th class="p-3 text-left">#</th>
                        <th class="p-3 text-left">Student</th>
                        <th class="p-3 text-left">Mobile</th>
                        <th class="p-3 text-left">Course</th>
                        <th class="p-3 text-left">ASN</th>
                        <th class="p-3 text-left">Batch</th>
                        <th class="p-3 text-left">Enrollment</th>

                    </tr>

                </thead>

                <tbody id="studentTable"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="script.js"></script>

<script>

function toggleDarkMode() {

    document.body.classList.toggle("bg-gray-100");
    document.body.classList.toggle("bg-gray-900");

    document.body.classList.toggle("text-gray-800");
    document.body.classList.toggle("text-white");
}

</script>

</body>
</html>
