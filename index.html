<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Master</title>

    <!-- Tailwind -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 text-gray-800 transition duration-300">

    <div class="max-w-7xl mx-auto p-6">

        <!-- TOP BAR -->

        <div class="flex justify-between items-center mb-8">

            <h1 class="text-3xl font-bold tracking-wide">
                Student Master
            </h1>

            <div class="flex items-center gap-3">

                <a href="index2.html"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-medium transition shadow">

                    Open Index 2

                </a>

                <button onclick="toggleDarkMode()"
                    tabindex="50"
                    class="w-12 h-12 rounded-full bg-white shadow hover:bg-gray-200 transition">

                    <i class="fas fa-moon"></i>

                </button>

            </div>

        </div>


        <!-- DASHBOARD -->

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

            <div class="bg-white p-6 rounded-2xl shadow">

                <h2 class="text-sm text-gray-500 uppercase">
                    Total Students
                </h2>

                <div id="studentCount"
                    class="text-4xl font-bold mt-2">

                    0

                </div>

            </div>

            <div class="bg-white p-6 rounded-2xl shadow">

                <h2 class="text-sm text-gray-500 uppercase">
                    Courses
                </h2>

                <div id="courseCount"
                    class="text-4xl font-bold mt-2">

                    0

                </div>

            </div>

        </div>


        <!-- FORM -->

        <div class="relative bg-white rounded-2xl shadow p-8 mb-8">

            <!-- LOADER -->

            <div id="formLoader"
                class="hidden absolute inset-0 bg-white bg-opacity-80 flex items-center justify-center z-50 rounded-2xl">

                <div class="flex flex-col items-center gap-4">

                    <div class="animate-spin rounded-full h-14 w-14 border-b-4 border-blue-600"></div>

                    <div class="text-sm font-medium text-gray-700">
                        Saving Student...
                    </div>

                </div>

            </div>


            <!-- HEADER -->

            <div class="flex justify-between items-center mb-8">

                <div class="flex items-center gap-4">

                    <h2 class="text-2xl font-semibold text-gray-800">
                        Student Form
                    </h2>

                    <div id="formMode"
                        class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded-full">

                        Add Mode

                    </div>

                </div>


                <!-- SETTINGS BUTTON -->

                <div class="relative">

                    <button onclick="toggleFieldSettings()"
                        class="w-11 h-11 rounded-full bg-gray-100 hover:bg-gray-200 transition flex items-center justify-center">

                        <i class="fas fa-sliders-h text-gray-700"></i>

                    </button>

                </div>

            </div>


            <!-- FIELD SETTINGS -->

            <div id="fieldSettings"
                class="hidden mb-8 border border-gray-200 rounded-2xl p-5 bg-gray-50">

                <div class="flex items-center justify-between mb-4">

                    <h3 class="font-semibold text-gray-700">
                        Enable / Disable Fields
                    </h3>

                    <div class="text-xs text-gray-500">
                        Toggle form fields
                    </div>

                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm">

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('studentName', this.checked)">

                        Student Name

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('mobileNo', this.checked)">

                        Mobile Number

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('enrollmentDate', this.checked)">

                        Enrollment Date

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('courseName', this.checked)">

                        Course

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('batchMonth', this.checked)">

                        Batch Month

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('batchYear', this.checked)">

                        Batch Year

                    </label>

                    <label class="flex items-center gap-2 bg-white p-3 rounded-xl border">

                        <input type="checkbox"
                            checked
                            onchange="toggleField('enrollmentNo', this.checked)">

                        Enrollment Number

                    </label>

                </div>

            </div>


            <!-- HIDDEN ID -->

            <input type="hidden" id="rowId">


            <!-- FORM GRID -->

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">


                <!-- STUDENT NAME -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Student Name *
                    </label>

                    <input id="studentName"
                        type="text"
                        tabindex="1"
                        placeholder="Enter Student Name"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                </div>


                <!-- MOBILE -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Mobile Number
                    </label>

                    <input id="mobileNo"
                        type="text"
                        tabindex="2"
                        placeholder="Enter Mobile Number"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                </div>


                <!-- ENROLLMENT DATE -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Enrollment Date *
                    </label>

                    <input id="enrollmentDate"
                        type="date"
                        tabindex="3"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                </div>


                <!-- COURSE -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Course *
                    </label>

                    <select id="courseName"
                        tabindex="4"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                        <option value="">Select Course</option>

                        <option value="Advance Certification in Investment Law and Institutional Finance">ACIIF</option>

                        <option value="Executive Certification in Corporate Social Responsibility">CSR</option>

                        <option value="Executive Certification in Sexual Harassment Prevention and Workplace Diversity Laws">SHP</option>

                        <option value="Certificate Course in Industrial and Labor Laws">CIL</option>

                        <option value="Certificate Course in Real Estate Laws">CRE</option>

                        <option value="Certification in Transfer Pricing Laws">CTP</option>

                        <option value="Certificate Course in Criminal Litigation and Trial Advocacy Laws">CLTA</option>

                        <option value="Advance Certificate of Companies Act, 2013">ACCA</option>

                        <option value="Advance Certification in Information Technology and Social Media Laws">ACITSM</option>

                    </select>

                </div>


                <!-- BATCH MONTH -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Batch Month
                    </label>

                    <select id="batchMonth"
                        tabindex="5"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                        <option value="">Month</option>

                        <option>Jan</option>
                        <option>Feb</option>
                        <option>Mar</option>
                        <option>Apr</option>
                        <option>May</option>
                        <option>Jun</option>
                        <option>Jul</option>
                        <option>Aug</option>
                        <option>Sep</option>
                        <option>Oct</option>
                        <option>Nov</option>
                        <option>Dec</option>

                    </select>

                </div>


                <!-- BATCH YEAR -->

                <div>

                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Batch Year
                    </label>

                    <input id="batchYear"
                        type="number"
                        tabindex="6"
                        placeholder="YYYY"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                <!-- ENROLLMENT NUMBER -->
                <div class="md:col-span-3">
                    <label class="text-sm font-semibold block mb-2 text-gray-700">
                        Enrollment Number
                    </label>
                    <input id="enrollmentNo"
                        type="text"
                        tabindex="7"
                        placeholder="Enter Enrollment Number"
                        class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
            </div>
            <!-- BUTTONS -->
            <div class="flex justify-between items-center mt-8">
                <!-- CLEAR -->
                <button onclick="clearForm()"
                    tabindex="8"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-8 py-3 rounded-xl font-medium transition">
                    Clear
                </button>
                <!-- SAVE -->
                <button onclick="saveStudent()"
                    id="saveBtn"
                    tabindex="9"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-medium transition shadow-lg">
                    Save Student
                </button>
            </div>
        </div>


        <!-- FILTERS -->
        <div class="bg-white rounded-2xl shadow p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text"
                    id="search"
                    placeholder="Search student..."
                    onkeyup="searchStudent()"
                    class="border rounded-lg p-3">
                <select id="courseFilter"
                    onchange="filterByCourse()"
                    class="border rounded-lg p-3">
                    <option value="">All Courses</option>
                </select>
                <button onclick="exportExcel()"
                    class="bg-green-600 hover:bg-green-700 text-white rounded-lg p-3">
                    Export Excel
                </button>
            </div>
        </div>


        <!-- TABLE -->

        <div class="bg-white rounded-2xl shadow overflow-auto">

            <table id="studentTableExcel"
                class="w-full text-sm">

                <thead class="bg-gray-100">

                    <tr>

                        <th class="p-4 text-left">#</th>

                        <th class="p-4 text-left">Student</th>

                        <th class="p-4 text-left">Mobile</th>

                        <th class="p-4 text-left">Enrollment</th>

                        <th class="p-4 text-left">Course</th>

                        <th class="p-4 text-left">Batch</th>

                        <th class="p-4 text-left">Enrollment Date</th>

                        <th class="p-4 text-left">Action</th>

                    </tr>

                </thead>

                <tbody id="studentTable"></tbody>

            </table>

        </div>


        <!-- PAGINATION -->

        <div class="flex justify-center items-center gap-4 mt-6">

            <button onclick="prevPage()"
                class="bg-gray-200 px-5 py-2 rounded-lg">

                Prev

            </button>

            <div id="pageNumber"
                class="font-semibold">

                1

            </div>

            <button onclick="nextPage()"
                class="bg-gray-200 px-5 py-2 rounded-lg">

                Next

            </button>

        </div>

    </div>


    <!-- TOAST -->

    <div id="toast"
        class="fixed top-5 right-5 hidden bg-black text-white px-6 py-4 rounded-xl shadow-lg z-50">

        Toast

    </div>

    <script src="script.js"></script>

</body>

</html>
